    <!-- fork -->
    <path d="M24 16v12" />
    <path d="M21 16v6" />
    <path d="M27 16v6" />
    <!-- spoon (head + handle) -->
    <path d="M44 18c0 3-2.5 5-5.5 5s-5.5-2-5.5-5 2.5-5 5.5-5 5.5 2 5.5 5z" />
    <path d="M42.5 23l-12 18" />
    <!-- cross connector -->
    <path d="M32 34l8-12" />
